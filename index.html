<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABAK 2026</title>
    <script src="https://cdn.tailwindcss.com"><\/script>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    gold: { 50: '#FFFBEB', 100: '#FFF8DC', 200: '#FFE999', 300: '#FFD700', 400: '#DAA520', 500: '#B8860B', 600: '#996515' },
                    dark: { 50: '#1a1a1a', 100: '#141414', 200: '#0f0f0f', 300: '#0a0a0a', 400: '#050505' }
                },
                fontFamily: {
                    display: ['Playfair Display', 'Georgia', 'serif'],
                    body: ['Inter', 'system-ui', 'sans-serif']
                }
            }
        }
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #0a0a0a; color: #fff; overflow-x: hidden; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #FFD700, #DAA520); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #FFD700; }

        /* Gold Text Gradient */
        .text-gold-gradient {
            background: linear-gradient(135deg, #FFD700, #FFF8DC, #DAA520, #FFD700);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Particle System */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            border-radius: 50%;
        }

        .particle-gold {
            background: radial-gradient(circle, #FFD700, transparent);
            box-shadow: 0 0 6px #FFD700, 0 0 12px rgba(255, 215, 0, 0.3);
        }

        .particle-star {
            background: #FFF8DC;
            box-shadow: 0 0 4px #FFD700;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.6; }
            100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0) rotate(0deg); }
            25% { transform: translateY(-20px) translateX(10px) rotate(5deg); }
            50% { transform: translateY(-10px) translateX(-5px) rotate(-3deg); }
            75% { transform: translateY(-25px) translateX(8px) rotate(4deg); }
        }

        /* Lock Screen Animations */
        .lock-input {
            background: rgba(255, 215, 0, 0.05);
            border: 2px solid rgba(255, 215, 0, 0.3);
            color: #FFD700;
            font-family: 'Inter', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 0.3em;
            text-align: center;
            padding: 16px 24px;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 320px;
        }
        .lock-input:focus {
            border-color: #FFD700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2), inset 0 0 20px rgba(255, 215, 0, 0.05);
        }
        .lock-input::placeholder {
            color: rgba(255, 215, 0, 0.3);
            letter-spacing: 0.2em;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-8px); }
            20%, 40%, 60%, 80% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.6s ease-in-out; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse-gold {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.4); }
            50% { box-shadow: 0 0 0 15px rgba(255, 215, 0, 0); }
        }

        @keyframes spotlight {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        /* Scroll Reveal */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
        .reveal-left {
            opacity: 0;
            transform: translateX(-50px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal-left.active {
            opacity: 1;
            transform: translateX(0);
        }
        .reveal-right {
            opacity: 0;
            transform: translateX(50px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal-right.active {
            opacity: 1;
            transform: translateX(0);
        }
        .reveal-scale {
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal-scale.active {
            opacity: 1;
            transform: scale(1);
        }

        /* Hero Section */
        .hero-bg {
            background: radial-gradient(ellipse at center bottom, rgba(255, 215, 0, 0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 20% 50%, rgba(218, 165, 32, 0.05) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 50%, rgba(218, 165, 32, 0.05) 0%, transparent 50%);
        }

        /* MJ Hat Icon */
        .mj-hat {
            display: inline-block;
            width: 60px;
            height: 30px;
            background: #FFD700;
            border-radius: 50% 50% 0 0;
            position: relative;
            margin: 0 auto;
        }
        .mj-hat::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: -15px;
            right: -15px;
            height: 8px;
            background: #FFD700;
            border-radius: 50%;
        }

        /* Video Card */
        .video-card {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 215, 0, 0.15);
            background: rgba(255, 215, 0, 0.03);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .video-card:hover {
            border-color: rgba(255, 215, 0, 0.4);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(255, 215, 0, 0.1);
        }
        .video-card iframe {
            width: 100%;
            aspect-ratio: 16/9;
            display: block;
        }

        /* Comment Styles */
        .comment-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.2);
            color: #fff;
            padding: 14px 18px;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
            width: 100%;
        }
        .comment-input:focus {
            border-color: #FFD700;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1);
        }
        .comment-input::placeholder { color: rgba(255, 255, 255, 0.3); }

        .comment-bubble {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.05), rgba(255, 215, 0, 0.02));
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
        }
        .comment-bubble:hover {
            border-color: rgba(255, 215, 0, 0.25);
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.08), rgba(255, 215, 0, 0.03));
        }

        /* Gold Button */
        .btn-gold {
            background: linear-gradient(135deg, #FFD700, #DAA520);
            color: #0a0a0a;
            font-weight: 600;
            padding: 14px 32px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3);
        }
        .btn-gold:active { transform: translateY(0); }
        .btn-gold::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: rotate(45deg);
            animation: spotlight 3s ease-in-out infinite;
        }

        /* Divider */
        .gold-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.3), transparent);
            margin: 0 auto;
            width: 60%;
        }

        /* Nav Active (mobile fallback) */
        .nav-link {
            position: relative;
            color: rgba(255, 255, 255, 0.6);
            transition: color 0.3s ease;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .nav-link:hover, .nav-link.active {
            color: #FFD700;
        }

        /* ===== GRADIENT PILL NAV (Desktop) ===== */
        .nav-pill {
            position: relative;
            width: 48px;
            height: 48px;
            background: rgba(255,215,0,0.06);
            border: 1px solid rgba(255,215,0,0.15);
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            text-decoration: none;
        }
        .nav-pill:hover {
            width: 140px;
            background: transparent;
            border-color: transparent;
        }
        /* Gold gradient fill on hover */
        .nav-pill .nav-pill-bg {
            position: absolute;
            inset: 0;
            border-radius: 9999px;
            background: linear-gradient(135deg, var(--pill-from, #FFD700), var(--pill-to, #DAA520));
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .nav-pill:hover .nav-pill-bg {
            opacity: 1;
        }
        /* Glow blur under pill */
        .nav-pill .nav-pill-glow {
            position: absolute;
            top: 8px;
            inset: 0;
            border-radius: 9999px;
            background: linear-gradient(135deg, var(--pill-from, #FFD700), var(--pill-to, #DAA520));
            filter: blur(12px);
            opacity: 0;
            z-index: -1;
            transition: opacity 0.5s ease;
        }
        .nav-pill:hover .nav-pill-glow {
            opacity: 0.4;
        }
        /* Icon inside pill */
        .nav-pill .nav-pill-icon {
            position: relative;
            z-index: 2;
            font-size: 1.1rem;
            color: rgba(255,215,0,0.6);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-pill:hover .nav-pill-icon {
            transform: scale(0);
            opacity: 0;
        }
        /* Text label */
        .nav-pill .nav-pill-label {
            position: absolute;
            z-index: 2;
            color: #0a0a0a;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            white-space: nowrap;
            transform: scale(0);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1) 0.1s;
        }
        .nav-pill:hover .nav-pill-label {
            transform: scale(1);
        }
        /* Active state */
        .nav-pill.active {
            border-color: rgba(255,215,0,0.4);
            background: rgba(255,215,0,0.1);
        }
        .nav-pill.active .nav-pill-icon {
            color: #FFD700;
        }
        /* Logout pill special */
        .nav-pill-logout {
            --pill-from: #ef4444;
            --pill-to: #dc2626;
        }
        .nav-pill-logout .nav-pill-icon {
            color: rgba(255,255,255,0.25);
        }
        .nav-pill-logout .nav-pill-label {
            color: #fff;
        }

        /* Floating decorative elements */
        .float-element {
            position: absolute;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
        }

        /* Section Background Glow */
        .section-glow::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.06), transparent 70%);
            pointer-events: none;
        }

        /* Loading spinner */
        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 215, 0, 0.2);
            border-top-color: #FFD700;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Glitter cursor trail */
        .cursor-sparkle {
            position: fixed;
            pointer-events: none;
            width: 4px;
            height: 4px;
            background: #FFD700;
            border-radius: 50%;
            z-index: 9999;
            animation: sparkle-fade 0.6s ease-out forwards;
        }
        @keyframes sparkle-fade {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0); }
        }

        /* Music note float animation */
        .music-note {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0;
            animation: noteFloat 3s ease-in-out infinite;
        }
        @keyframes noteFloat {
            0% { opacity: 0; transform: translateY(0) rotate(0deg); }
            20% { opacity: 0.6; }
            80% { opacity: 0.3; }
            100% { opacity: 0; transform: translateY(-80px) rotate(15deg); }
        }

        /* ===== PREMIUM EFFECTS ===== */

        /* Film Grain Overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.04;
            pointer-events: none;
            z-index: 9998;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        /* Spotlight Beam */
        .spotlight {
            position: absolute;
            width: 300px;
            height: 600px;
            background: linear-gradient(180deg, rgba(255,215,0,0.15) 0%, transparent 100%);
            clip-path: polygon(40% 0%, 60% 0%, 100% 100%, 0% 100%);
            pointer-events: none;
            opacity: 0;
            z-index: 1;
        }

        /* MJ Silhouette */
        .mj-silhouette {
            position: absolute;
            opacity: 0.06;
            z-index: 1;
            filter: drop-shadow(0 0 30px rgba(255,215,0,0.3));
        }

        /* Split text chars */
        .split-char {
            display: inline-block;
            opacity: 0;
            transform: translateY(80px) rotateX(-90deg);
        }

        /* Horizontal scroll section */
        .horizontal-section {
            overflow: hidden;
        }

        /* Gold glow text */
        .text-gold-glow {
            text-shadow: 0 0 20px rgba(255,215,0,0.4), 0 0 40px rgba(255,215,0,0.2), 0 0 80px rgba(255,215,0,0.1);
        }

        /* Vinyl Record */
        .vinyl {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #1a1a1a, #2a2a2a, #1a1a1a, #2a2a2a, #1a1a1a);
            border: 3px solid rgba(255,215,0,0.3);
            position: relative;
        }
        .vinyl::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #FFD700;
            border: 4px solid #0a0a0a;
        }
        @keyframes spin-vinyl {
            to { transform: rotate(360deg); }
        }

        /* ── MJ Vinyl Jukebox ── */
        .jukebox-row {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 20px;
            padding: 0 24px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .jukebox-row::-webkit-scrollbar { display: none; }
        .jukebox-disc {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            touch-action: manipulation;
        }
        .jukebox-vinyl {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            background:
                radial-gradient(circle at 50% 50%, #111 0%, #111 18%, transparent 18.5%),
                radial-gradient(circle at 50% 50%, #222 18.5%, #222 19.5%, transparent 20%),
                repeating-radial-gradient(circle at 50% 50%, transparent 20%, transparent 22%, rgba(40,40,40,0.6) 22.5%, transparent 23%),
                repeating-radial-gradient(circle at 50% 50%, transparent 25%, transparent 27%, rgba(50,50,50,0.4) 27.5%, transparent 28%),
                repeating-radial-gradient(circle at 50% 50%, transparent 30%, transparent 33%, rgba(40,40,40,0.5) 33.5%, transparent 34%),
                repeating-radial-gradient(circle at 50% 50%, transparent 36%, transparent 39%, rgba(45,45,45,0.4) 39.5%, transparent 40%),
                repeating-radial-gradient(circle at 50% 50%, transparent 42%, transparent 45%, rgba(35,35,35,0.5) 45.5%, transparent 46%),
                conic-gradient(from 0deg, #0d0d0d, #1a1a1a 10%, #0f0f0f 20%, #1c1c1c 30%, #0d0d0d 40%, #1a1a1a 50%, #0f0f0f 60%, #1c1c1c 70%, #0d0d0d 80%, #1a1a1a 90%, #0d0d0d);
            border: 2px solid rgba(255,215,0,0.2);
            position: relative;
            transition: border-color 0.3s, box-shadow 0.3s;
            box-shadow: 0 2px 12px rgba(0,0,0,0.6);
        }
        .jukebox-vinyl::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: radial-gradient(circle, #333 30%, #1a1a1a 70%);
            border: 2px solid rgba(255,215,0,0.3);
            z-index: 1;
        }
        .jukebox-vinyl::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #FFD700;
            z-index: 2;
        }
        .jukebox-disc:hover .jukebox-vinyl,
        .jukebox-disc:active .jukebox-vinyl {
            border-color: rgba(255,215,0,0.5);
            box-shadow: 0 0 20px rgba(255,215,0,0.15), 0 2px 12px rgba(0,0,0,0.6);
        }
        .jukebox-disc.playing .jukebox-vinyl {
            animation: spin-vinyl 1.8s linear infinite;
            border-color: rgba(255,215,0,0.6);
            box-shadow: 0 0 28px rgba(255,215,0,0.25), 0 2px 12px rgba(0,0,0,0.6);
        }
        .jukebox-title {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            text-align: center;
            max-width: 76px;
            line-height: 1.25;
            transition: color 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .jukebox-disc.playing .jukebox-title {
            color: #FFD700;
        }
        .jukebox-now-playing {
            font-size: 8px;
            color: #FFD700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0;
            transition: opacity 0.3s;
            height: 12px;
            font-family: 'Inter', sans-serif;
        }
        .jukebox-disc.playing .jukebox-now-playing {
            opacity: 1;
            animation: pulse-text 1.5s ease-in-out infinite;
        }
        @keyframes pulse-text {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        .jukebox-pause-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(255,215,0,0.06);
            color: #FFD700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            align-self: center;
            flex-shrink: 0;
            transition: background 0.3s, border-color 0.3s, transform 0.2s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .jukebox-pause-btn:hover,
        .jukebox-pause-btn:active {
            background: rgba(255,215,0,0.14);
            border-color: rgba(255,215,0,0.5);
            transform: scale(1.1);
        }
        /* YouTube player offscreen but renderable */
        .yt-player-hidden {
            position: fixed;
            left: -9999px;
            top: -9999px;
            width: 160px;
            height: 90px;
            opacity: 0;
            pointer-events: none;
        }
        @media (max-width: 639px) {
            .jukebox-row {
                justify-content: flex-start;
                gap: 14px;
                padding: 0 20px;
                scroll-snap-type: x mandatory;
            }
            .jukebox-disc {
                scroll-snap-align: center;
            }
            .jukebox-vinyl { width: 62px; height: 62px; }
            .jukebox-vinyl::before { width: 24px; height: 24px; }
            .jukebox-vinyl::after { width: 8px; height: 8px; }
            .jukebox-title { font-size: 9px; max-width: 66px; }
            .jukebox-pause-btn { width: 44px; height: 44px; font-size: 18px; }
        }

        /* Section divider with MJ flair */
        .mj-divider {
            position: relative;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .mj-divider::before, .mj-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.3), transparent);
        }

        /* Scroll progress bar */
        #scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #FFD700, #FFF8DC, #DAA520);
            z-index: 9999;
            transform-origin: left;
            transform: scaleX(0);
        }

        /* Parallax layer */
        .parallax-bg {
            position: absolute;
            inset: -20%;
            z-index: 0;
        }

        /* Image reveal clip */
        .img-reveal {
            clip-path: inset(100% 0% 0% 0%);
        }

        /* Quote marks decorative */
        .quote-mark {
            font-family: 'Playfair Display', serif;
            font-size: 8rem;
            line-height: 0;
            color: rgba(255,215,0,0.08);
            position: absolute;
        }

        /* Glowing border animation */
        @keyframes border-glow {
            0%, 100% { border-color: rgba(255,215,0,0.1); }
            50% { border-color: rgba(255,215,0,0.4); }
        }
        .glow-border {
            animation: border-glow 3s ease-in-out infinite;
        }

        /* Typewriter cursor */
        .typewriter-cursor {
            display: inline-block;
            width: 3px;
            height: 1em;
            background: #FFD700;
            margin-left: 4px;
            animation: blink 0.8s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Stage floor reflection */
        .stage-reflection {
            background: linear-gradient(180deg, transparent 0%, rgba(255,215,0,0.03) 50%, transparent 100%);
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40%;
            pointer-events: none;
        }

        /* ===== MARQUEE TICKER ===== */
        .marquee-track {
            display: flex;
            width: max-content;
            animation: marquee-scroll 40s linear infinite;
        }
        .marquee-track:hover { animation-play-state: paused; }
        @keyframes marquee-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .marquee-item {
            white-space: nowrap;
            padding: 0 2rem;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 0.9rem;
            color: rgba(255,215,0,0.2);
            letter-spacing: 0.1em;
        }
        .marquee-separator {
            color: rgba(255,215,0,0.15);
            padding: 0 0.5rem;
        }

        /* ===== ANIMATED GRADIENT ORBS ===== */
        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.08;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes orb-drift-1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -30px) scale(1.1); }
            66% { transform: translate(-30px, 40px) scale(0.95); }
        }
        @keyframes orb-drift-2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-40px, 50px) scale(1.15); }
            66% { transform: translate(60px, -20px) scale(0.9); }
        }

        /* ===== MAGNETIC BUTTON ===== */
        .btn-magnetic {
            transition: transform 0.2s cubic-bezier(0.33, 1, 0.68, 1);
        }

        /* ===== WORD REVEAL ===== */
        .word-reveal {
            overflow: hidden;
            display: inline-block;
        }
        .word-reveal-inner {
            display: inline-block;
            transform: translateY(110%);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .word-reveal.active .word-reveal-inner {
            transform: translateY(0);
        }

        /* ===== STAGGER CHILDREN ===== */
        .stagger-in > * {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .stagger-in.active > * { opacity: 1; transform: translateY(0); }
        .stagger-in.active > *:nth-child(1) { transition-delay: 0s; }
        .stagger-in.active > *:nth-child(2) { transition-delay: 0.08s; }
        .stagger-in.active > *:nth-child(3) { transition-delay: 0.16s; }
        .stagger-in.active > *:nth-child(4) { transition-delay: 0.24s; }
        .stagger-in.active > *:nth-child(5) { transition-delay: 0.32s; }
        .stagger-in.active > *:nth-child(6) { transition-delay: 0.40s; }

        /* ===== GLITCH TEXT ===== */
        .glitch-text {
            position: relative;
        }
        .glitch-text::before, .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
        }
        .glitch-text:hover::before {
            animation: glitch-1 0.3s ease;
            opacity: 0.8;
            color: #FFD700;
            clip-path: inset(20% 0 40% 0);
        }
        .glitch-text:hover::after {
            animation: glitch-2 0.3s ease;
            opacity: 0.8;
            color: #DAA520;
            clip-path: inset(60% 0 10% 0);
        }
        @keyframes glitch-1 {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(3px, -3px); }
            60% { transform: translate(-2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        @keyframes glitch-2 {
            0% { transform: translate(0); }
            20% { transform: translate(3px, -3px); }
            40% { transform: translate(-3px, 3px); }
            60% { transform: translate(2px, -2px); }
            80% { transform: translate(-2px, 2px); }
            100% { transform: translate(0); }
        }

        /* ===== IMAGE KEN BURNS ===== */
        .ken-burns {
            overflow: hidden;
        }
        .ken-burns img, .ken-burns > div {
            transition: transform 8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .ken-burns:hover img, .ken-burns:hover > div {
            transform: scale(1.08);
        }

        /* ===== TILT CARD 3D ===== */
        .tilt-card {
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        /* ===== CONFETTI ===== */
        .confetti-piece {
            position: fixed;
            width: 8px;
            height: 8px;
            z-index: 9999;
            pointer-events: none;
            animation: confetti-fall 1.5s ease-out forwards;
        }
        @keyframes confetti-fall {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(200px) rotate(720deg) scale(0); opacity: 0; }
        }

        /* ===== HERO ANIMATED BG ===== */
        @keyframes hero-gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .hero-animated-bg {
            background:
                radial-gradient(ellipse at 20% 80%, rgba(255,215,0,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(218,165,32,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(255,215,0,0.08) 0%, transparent 40%);
            background-size: 200% 200%;
            animation: hero-gradient-shift 15s ease-in-out infinite;
        }

        /* ===== PULSING RING ===== */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0; }
            50% { opacity: 0.15; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        .pulse-ring {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 50%;
            animation: pulse-ring 4s ease-out infinite;
        }

        /* ===== COUNTER ===== */
        .counter-number {
            font-variant-numeric: tabular-nums;
        }

        /* ===== SMOOTH REVEAL LINE ===== */
        .line-reveal {
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #FFD700, #DAA520);
            transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .line-reveal.active { width: 100%; }

        /* ===== DONUT CHART ===== */
        .donut-chart {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            position: relative;
            background: conic-gradient(
                #FFD700 0deg, #FFD700 0deg,
                rgba(239,68,68,0.6) 0deg, rgba(239,68,68,0.6) 360deg
            );
            transition: background 1.5s ease-out;
        }
        .donut-chart.active {
            background: conic-gradient(
                #FFD700 0deg, #FFD700 253.9deg,
                rgba(239,68,68,0.6) 253.9deg, rgba(239,68,68,0.6) 360deg
            );
        }
        .donut-chart::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #0a0a0a;
        }
        .donut-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            text-align: center;
        }
        .donut-legend {
            display: flex;
            flex-col: column;
            gap: 8px;
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }

        /* ===== AUDIO EQUALIZER BARS ===== */
        .equalizer {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 30px;
        }
        .eq-bar {
            width: 4px;
            background: linear-gradient(180deg, #FFD700, #DAA520);
            border-radius: 2px;
            animation: eq-bounce var(--eq-speed, 0.8s) ease-in-out infinite alternate;
        }
        @keyframes eq-bounce {
            0% { height: var(--eq-min, 4px); }
            100% { height: var(--eq-max, 24px); }
        }

        /* ===== ENHANCED SPARKLE ===== */
        .sparkle-ring {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            width: 20px;
            height: 20px;
            border: 1px solid rgba(255,215,0,0.4);
            border-radius: 50%;
            animation: sparkle-ring-fade 0.8s ease-out forwards;
        }
        @keyframes sparkle-ring-fade {
            0% { opacity: 1; transform: scale(0.3); }
            100% { opacity: 0; transform: scale(2); }
        }

        /* ===== CINEMATIC UNLOCK BARS ===== */
        .cinema-bar {
            position: fixed;
            left: 0;
            right: 0;
            height: 0;
            background: black;
            z-index: 55;
            transition: height 0.8s cubic-bezier(0.76, 0, 0.24, 1);
        }
        .cinema-bar-top { top: 0; }
        .cinema-bar-bottom { bottom: 0; }

        /* ===== SECTION GLOW PULSE ===== */
        .section-glow-pulse {
            position: relative;
        }
        .section-glow-pulse::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,215,0,0.03), transparent 60%);
            animation: glow-breathe 6s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes glow-breathe {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
        }

        /* ===== HOVER LIFT ===== */
        .hover-lift {
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease;
        }
        .hover-lift:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 60px rgba(255,215,0,0.08), 0 8px 20px rgba(0,0,0,0.3);
        }

        /* ===== SMOOTH TEXT GRADIENT ANIM ===== */
        @keyframes gradient-flow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        .text-gradient-flow {
            background: linear-gradient(90deg, #FFD700, #FFF8DC, #DAA520, #FFD700, #FFF8DC);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-flow 4s linear infinite;
        }

        img { pointer-events: none; -webkit-user-select: none; user-select: none; }
        body { -webkit-user-select: none; user-select: none; }
        input, textarea { -webkit-user-select: auto; user-select: auto; }
        @media print { body { display: none !important; } }
    </style>
</head>

        };

        // Particle system for lock screen
        function createLockParticles() {
            const container = document.getElementById('lock-particles');
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                const isStar = Math.random() > 0.6;
                const size = isStar ? (Math.random() * 8 + 4) : (Math.random() * 4 + 2);
                p.className = 'particle ' + (isStar ? 'particle-star' : 'particle-gold');
                p.style.cssText = 'width:' + size + 'px;height:' + size + 'px;left:' + (Math.random()*100) + '%;animation:fall ' + (Math.random()*8+6) + 's linear infinite;animation-delay:' + (Math.random()*10) + 's;';
                container.appendChild(p);
            }
        }
        createLockParticles();

        const pwInput = document.getElementById('password-input');
        const enterBtn = document.getElementById('enter-btn');
        const errorMsg = document.getElementById('error-msg');

        async function decrypt(password) {
            const enc = new TextEncoder();
            const saltBytes = Uint8Array.from(atob(ENCRYPTED_DATA.salt), c => c.charCodeAt(0));
            const combined = Uint8Array.from(atob(ENCRYPTED_DATA.data), c => c.charCodeAt(0));

            // Import password as key material
            const keyMaterial = await crypto.subtle.importKey(
                'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
            );

            // Derive AES-GCM key
            const key = await crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt: saltBytes, iterations: 100000, hash: 'SHA-256' },
                keyMaterial,
                { name: 'AES-GCM', length: 256 },
                false,
                ['decrypt']
            );

            // Split combined: iv (12 bytes) + ciphertext + tag (16 bytes appended by Web Crypto)
            const iv = combined.slice(0, 12);
            const ciphertext = combined.slice(12);

            const decrypted = await crypto.subtle.decrypt(
                { name: 'AES-GCM', iv: iv },
                key,
                ciphertext
            );

            return new TextDecoder().decode(decrypted);
        }

        async function tryUnlock() {
            const pw = pwInput.value;
            if (!pw) return;

            try {
                const html = await decrypt(pw);

                // Success
                const lockScreen = document.getElementById('lock-screen');
                lockScreen.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
                lockScreen.style.opacity = '0';
                lockScreen.style.transform = 'scale(1.05)';

                setTimeout(() => {
                    lockScreen.remove();
                    document.getElementById('decrypted-content').innerHTML = html;

                    // Execute any scripts in the decrypted content
                    const scripts = document.getElementById('decrypted-content').querySelectorAll('script');
                    scripts.forEach(oldScript => {
                        const newScript = document.createElement('script');
                        if (oldScript.src) {
                            newScript.src = oldScript.src;
                        } else {
                            newScript.textContent = oldScript.textContent;
                        }
                        oldScript.parentNode.replaceChild(newScript, oldScript);
                    });
                }, 800);
            } catch (e) {
                // Wrong password - decryption fails
                pwInput.classList.add('shake');
                errorMsg.style.opacity = '1';
                pwInput.style.borderColor = 'rgba(239, 68, 68, 0.5)';

                setTimeout(() => {
                    pwInput.classList.remove('shake');
                    pwInput.style.borderColor = 'rgba(255, 215, 0, 0.3)';
                }, 600);
                setTimeout(() => { errorMsg.style.opacity = '0'; }, 3000);
            }
        }

        enterBtn.addEventListener('click', tryUnlock);
        pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });
        setTimeout(() => pwInput.focus(), 500);
    })();
